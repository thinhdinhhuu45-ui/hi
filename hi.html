<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Vẽ Hình</title><style>
body{background:#111;color:#fff;font-family:Arial;display:flex;flex-direction:column;align-items:center;padding:10px}
textarea{width:100%;max-width:700px;height:180px;background:#222;color:#fff;border:1px solid #555;padding:8px}
button{margin:8px;padding:10px 24px;background:#0af;border:none;color:#fff;font-weight:700;cursor:pointer}
canvas{background:#000;border:1px solid #444;max-width:100%}
#e{color:#f55;margin-top:5px}
</style></head><body>
<h3>✏️ Vẽ Hình Bằng Script (có thể ẩn đường)</h3>
<textarea id="s" placeholder="Dán script vào đây..."></textarea>
<button onclick="draw()">🎨 Vẽ</button>
<div id="e"></div>
<canvas id="c" width="700" height="500"></canvas>
<script>
const ca=document.getElementById('c'),cx=ca.getContext('2d'),err=document.getElementById('e');
const O={p:{},l:{}};
function P(n,x,y){O.p[n]={x:+x,y:+y}}
function G(n){if(!O.p[n])throw Error('Thiếu điểm '+n);return O.p[n]}
function L(n,a,b,t='l'){O.l[n]={p1:G(a),p2:G(b),t}}
function S(n,a,b,r){const p=G(a),q=G(b);P(n,p.x+r*(q.x-p.x),p.y+r*(q.y-p.y))}
function I(n,l1,l2){const a=O.l[l1],b=O.l[l2];if(!a||!b)throw Error('Thiếu đường '+l1+' hoặc '+l2);const p=a.p1,q=a.p2,r=b.p1,s=b.p2,d=(p.x-q.x)*(r.y-s.y)-(p.y-q.y)*(r.x-s.x);if(Math.abs(d)<1e-9)throw Error('Song song/trùng');const t=((p.x-r.x)*(r.y-s.y)-(p.y-r.y)*(r.x-s.x))/d;P(n,p.x+t*(q.x-p.x),p.y+t*(q.y-p.y))}
function T(n,th,ln){const P=G(th),L=O.l[ln];if(!L)throw Error('Thiếu đường '+ln);const dx=L.p2.x-L.p1.x,dy=L.p2.y-L.p1.y;O.l[n]={p1:P,p2:{x:P.x-dy,y:P.y+dx},t:'l'}}
function R(){cx.clearRect(0,0,ca.width,ca.height);for(let n in O.l){if(n.startsWith('_'))continue;const l=O.l[n];cx.beginPath();cx.strokeStyle='#fff';cx.lineWidth=2;if(l.t==='s'){cx.moveTo(l.p1.x,l.p1.y);cx.lineTo(l.p2.x,l.p2.y)}else{const dx=l.p2.x-l.p1.x,dy=l.p2.y-l.p1.y,m=Math.sqrt(dx*dx+dy*dy)||1,s=2000/m;cx.moveTo(l.p1.x-dx/m*s,l.p1.y-dy/m*s);cx.lineTo(l.p1.x+dx/m*s,l.p1.y+dy/m*s)}cx.stroke()}for(let n in O.p){const p=O.p[n];cx.beginPath();cx.fillStyle='#ff0';cx.arc(p.x,p.y,4,0,6.28);cx.fill();cx.font='14px Arial';cx.fillStyle='#fff';cx.fillText(n,p.x+6,p.y-4)}}
function E(c){const t=c.trim();if(!t||t[0]=='/')return;let m;
if(m=t.match(/^point\s+(\w+)\s*=\s*([\d.]+)\s+([\d.]+)/))P(m[1],m[2],m[3]);
else if(m=t.match(/^point\s+(\w+)\s*=\s*on\s+segment\s+(\w+)\s+(\w+)\s+([\d.]+)/))S(m[1],m[2],m[3],+m[4]);
else if(m=t.match(/^point\s+(\w+)\s*=\s*intersection\s+(\w+)\s+(\w+)/))I(m[1],m[2],m[3]);
else if(m=t.match(/^line\s+(\w+)\s*=\s*through\s+(\w+)\s+perpendicular\s+(\w+)/))T(m[1],m[2],m[3]);
else if(m=t.match(/^line\s+(\w+)\s*=\s*through\s+(\w+)\s+(\w+)/)){
  if(m[3]==='perpendicular')throw Error('Sai cú pháp vuông góc: thiếu tên đường. Dùng: line <tên> = through <điểm> perpendicular <đường>');
  L(m[1],m[2],m[3],'l');
}
else if(m=t.match(/^segment\s+(\w+)\s*=\s*(\w+)\s+(\w+)/))L(m[1],m[2],m[3],'s');
}
function draw(){O.p={},O.l={},err.textContent='';try{document.getElementById('s').value.split('\n').filter(l=>l.trim()).forEach(E);R()}catch(e){err.textContent='❌ Lỗi: '+e.message}}
</script></body></html>
